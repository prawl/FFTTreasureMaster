# GitHub Actions workflow for FFT Treasure Master.
# Builds and publishes the Reloaded-II mod (in-process runtime DLL + baked treasure dataset).
# Mirrors the sibling FFTItemOverhaul mod's release pipeline.
#
# Produces:
#   - Build artifacts for testing (on every push)
#   - GitHub Release (on tag push: vX.Y.Z)
#   - Automatic changelog generation

name: Build and Publish FFT Treasure Master

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PUBLISH_PATH: ./Publish
  PUBLISH_CHANGELOG_PATH: ./Publish/Changelog.md

  # Keep console output UTF-8 on the Windows runner (the bake logs map names).
  PYTHONUTF8: "1"

  IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') }}
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to create releases
    defaults:
      run:
        shell: pwsh

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # full history for changelog

    - name: Setup Python (for the treasure-db bake + self-test gate)
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup .NET 9.0 SDK (for the runtime DLL)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Setup Node.js (for changelog)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Changelog Generator
      run: npm install -g auto-changelog

    - name: Generate Changelog
      run: |
        [System.IO.Directory]::CreateDirectory("$env:PUBLISH_PATH")
        if ($env:IS_RELEASE -eq 'true') {
            auto-changelog --sort-commits date --hide-credit --template keepachangelog --commit-limit false --starting-version "$env:RELEASE_TAG" --output "$env:PUBLISH_CHANGELOG_PATH"
        }
        else {
            auto-changelog --sort-commits date --hide-credit --template keepachangelog --commit-limit false --unreleased --output "$env:PUBLISH_CHANGELOG_PATH"
        }

    # Runs the WHOLE gated pipeline (bake + self-test -> unit tests -> DLL publish),
    # then stages, zips, and verifies the package. The bake and the unit-test gate
    # run INSIDE Publish.ps1 (tools/pipeline.ps1, exit codes honored).
    - name: Build and Package
      id: publish
      run: ./Publish.ps1

    # Independent assertion: even if Publish.ps1's own Verify-Package missed
    # something, this won't. Fails loud if the zip is missing, empty, or lacks the
    # runtime DLL or the baked dataset.
    - name: Verify Release Artifact
      run: |
        $zipName = '${{ steps.publish.outputs.zip }}'
        if (-not $zipName) { throw "Publish.ps1 did not emit a 'zip' output." }
        if (-not (Test-Path $zipName)) { throw "Expected zip not found: $zipName" }
        Add-Type -Assembly System.IO.Compression.FileSystem
        $z = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zipName))
        $hasDll          = $z.Entries | Where-Object { $_.Name -eq 'FFTTreasureMaster.dll' } | Select-Object -First 1
        $hasTreasureJson = $z.Entries | Where-Object { $_.Name -eq 'treasure.json' } | Select-Object -First 1
        $z.Dispose()
        if (-not $hasDll)          { throw "FFTTreasureMaster.dll missing from $zipName (ModConfig declares it)" }
        if (-not $hasTreasureJson) { throw "treasure.json missing from $zipName (the runtime requires it)" }
        Write-Host "OK: $zipName contains FFTTreasureMaster.dll + treasure.json"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FFTTreasureMaster-${{ github.sha }}
        path: ${{ steps.publish.outputs.zip }}
        retention-days: 30

    - name: Upload Changelog
      uses: actions/upload-artifact@v4
      with:
        name: Changelog
        path: ${{ env.PUBLISH_CHANGELOG_PATH }}
        retention-days: 30

    - name: Create GitHub Release (on Tag)
      uses: softprops/action-gh-release@v2
      if: env.IS_RELEASE == 'true'
      with:
        name: FFT Treasure Master ${{ env.RELEASE_TAG }}
        body_path: ${{ env.PUBLISH_CHANGELOG_PATH }}
        files: ${{ steps.publish.outputs.zip }}
        draft: false
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
